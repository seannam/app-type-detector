# Publish @indiecraft/app-type-detector to npm after Auto Release
# successfully cuts a tag.
#
# We listen for Auto Release via workflow_run rather than `push: tags`
# because Auto Release pushes tags as `github-actions[bot]` (via the
# default GITHUB_TOKEN), and GitHub intentionally blocks events
# produced by GITHUB_TOKEN from starting new workflow runs.
# `workflow_run` is exempt from that rule.
#
# This package ships as a SINGLE library: every native binary
# (one .node per supported triple) is bundled inside the root package
# under app/bindings/node/, not as separate per-triple subpackages.
# This mirrors the publishing model of @indiecraft/llm-model-catalog
# (one package, one publish, one trusted-publisher config on npm).
#
# This workflow never creates tags, GitHub releases, or CHANGELOG
# entries; those responsibilities stay exclusive to the version harness.

name: Release (npm)

on:
  workflow_run:
    workflows: ["Auto Release"]
    types: [completed]
    branches: [main]

concurrency:
  group: release-npm
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  resolve-version:
    name: Resolve canonical version
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_publish: ${{ steps.resolve.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version via scripts/version/current.sh
        id: resolve
        run: |
          set -euo pipefail
          git fetch --tags origin
          VERSION="$(./scripts/version/current.sh --raw)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Canonical version: $VERSION"
          if npm view "@indiecraft/app-type-detector@${VERSION}" version >/dev/null 2>&1; then
            echo "@indiecraft/app-type-detector@${VERSION} is already published on npm; skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Assert root manifest matches the canonical version
        run: |
          set -euo pipefail
          VERSION="${{ steps.resolve.outputs.version }}"
          actual="$(jq -r .version app/bindings/node/package.json)"
          if [ "$actual" != "$VERSION" ]; then
            echo "::error file=app/bindings/node/package.json::version $actual != canonical $VERSION"
            echo "Re-run scripts/version/sync.sh rust-cargo $VERSION on main." >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.triple }}
    needs: [resolve-version]
    if: needs.resolve-version.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: linux-x64-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm -C app/bindings/node exec napi build --platform --release --target x86_64-unknown-linux-gnu
          - triple: linux-arm64-gnu
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            setup: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
            build: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc pnpm -C app/bindings/node exec napi build --platform --release --target aarch64-unknown-linux-gnu
          - triple: linux-x64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
            build: pnpm -C app/bindings/node exec napi build --platform --release --target x86_64-unknown-linux-musl
          - triple: darwin-x64
            # macos-13 hosted runners are scarce / nearing EOL. macos-14
            # (arm64) can cross-compile to x86_64-apple-darwin via Rust's
            # own target flag; no extra SDK setup required on arm macs.
            os: macos-14
            target: x86_64-apple-darwin
            build: pnpm -C app/bindings/node exec napi build --platform --release --target x86_64-apple-darwin
          - triple: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            build: pnpm -C app/bindings/node exec napi build --platform --release --target aarch64-apple-darwin
          - triple: win32-x64-msvc
            os: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm -C app/bindings/node exec napi build --platform --release --target x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/bindings/node/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Platform-specific setup
        if: matrix.setup != ''
        run: ${{ matrix.setup }}
        shell: bash

      - name: Install Node dependencies
        run: pnpm -C app/bindings/node install --frozen-lockfile
        shell: bash

      - name: Build native binding (${{ matrix.triple }})
        run: ${{ matrix.build }}
        shell: bash

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.triple }}
          path: app/bindings/node/app-type-detector.${{ matrix.triple }}.node
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to npm
    needs: [resolve-version, build]
    if: needs.resolve-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC)
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) needs npm >= 11.5.1. Pin a specific
      # release rather than `npm@latest`: latest can land broken
      # (MODULE_NOT_FOUND: promise-retry in some 11.x publishes).
      - run: npm install -g npm@11.5.1

      - name: Download per-triple artifacts into the package root
        uses: actions/download-artifact@v4
        with:
          path: app/bindings/node/artifacts

      - name: Stage every .node binary into app/bindings/node/
        run: |
          set -euo pipefail
          for triple in linux-x64-gnu linux-arm64-gnu linux-x64-musl darwin-x64 darwin-arm64 win32-x64-msvc; do
            src="app/bindings/node/artifacts/binding-${triple}/app-type-detector.${triple}.node"
            dst="app/bindings/node/app-type-detector.${triple}.node"
            if [ ! -f "$src" ]; then
              echo "::error::missing artifact for triple $triple"
              exit 1
            fi
            cp "$src" "$dst"
            ls -la "$dst"
          done
          rm -rf app/bindings/node/artifacts

      # No NODE_AUTH_TOKEN: npm exchanges the GitHub OIDC token for a
      # short-lived publish credential after Trusted Publisher is
      # configured on the package's npm settings page (or auto-created
      # on first publish from a matching workflow). Provenance is
      # generated automatically under OIDC.
      - name: Publish single bundled package
        run: |
          set -euo pipefail
          echo "::group::publishing @indiecraft/app-type-detector@${VERSION}"
          (cd app/bindings/node && npm publish --access public --provenance)
          echo "::endgroup::"
